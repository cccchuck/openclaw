name: Build OpenClaw Green Packages (pnpm 10 + Node 24.14.0)

# 手动触发构建
on: 
  workflow_dispatch:

jobs:
  build-and-package:
    name: Build for ${{ matrix.arch_desc }}
    runs-on: ${{ matrix.os }}
    strategy:
      # 四台不同架构的服务器同时开工
      matrix:
        include:
          - os: windows-latest
            artifact_name: openclaw-win-x64.zip
            arch_desc: Windows_x64
          - os: macos-13
            # macos-13 是 GitHub 托管的最后一批 Intel 芯片 Mac 节点
            artifact_name: openclaw-mac-x64.zip
            arch_desc: Mac_Intel_x64
          - os: macos-latest
            # macos-latest 目前默认为苹果 M 系列芯片 (ARM64)
            artifact_name: openclaw-mac-arm64.zip
            arch_desc: Mac_Apple_Silicon_ARM64
          - os: ubuntu-latest
            artifact_name: openclaw-linux-x64.zip
            arch_desc: Linux_x64

    steps:
      - name: 1. 拉取源码
        uses: actions/checkout@v4

      - name: 2. 安装 pnpm 10.x
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 3. 锁定 Node.js 24.14.0 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: 'pnpm'

      - name: 4. 安装全量依赖 (用于编译)
        run: pnpm install --frozen-lockfile

      - name: 5. 执行项目构建 (产出 dist 目录)
        run: pnpm run build

      - name: 6. 核心步骤：重组物理 node_modules (解决离线软链接报错)
        # 强制将 node_modules 打平并转为物理文件，不使用 pnpm 默认的软链接
        shell: bash
        run: |
          rm -rf node_modules
          pnpm install --prod --config.node-linker=hoisted

      # ------ 差异化打包策略 (排除源码和没用的缓存) ------
      - name: 7A. 压缩绿化包 (Windows)
        if: runner.os == 'Windows'
        run: |
          # 排除 .git, .github, src 等开发环境目录
          Compress-Archive -Path bin, dist, node_modules, package.json -DestinationPath ${{ matrix.artifact_name }} -Force

      - name: 7B. 压缩绿化包 (Mac & Linux)
        if: runner.os == 'macOS' || runner.os == 'Linux'
        run: |
          # 只打包运行必须的文件，极大缩小体积
          zip -q -r ${{ matrix.artifact_name }} bin dist node_modules package.json

      - name: 8. 上传构建产物 (有效期 3 天)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 3
